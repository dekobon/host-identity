name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

# Default to read-only; jobs that need more escalate explicitly.
permissions:
  contents: read

# Cancel in-progress runs for the same ref (e.g. PR pushes) but not on
# main or tag builds — those should always complete.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' && !startsWith(github.ref, 'refs/tags/') }}

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  CARGO_NET_RETRY: 10
  RUSTUP_MAX_RETRIES: 10
  RUSTFLAGS: "-D warnings"
  RUSTDOCFLAGS: "-D warnings"

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-targets --all-features --workspace -- -D warnings

  docs:
    name: rustdoc
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo doc --no-deps --all-features --workspace

  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --all-features --workspace --locked

  msrv:
    name: msrv (1.85)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.85
      - uses: Swatinem/rust-cache@v2
      # Build only — MSRV is a compile-time promise; dev-deps may
      # require a newer toolchain.
      - run: cargo build --all-features --workspace --locked

  feature-matrix:
    name: features (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: no-default-features (lib)
            flags: --no-default-features -p host-identity
          - name: no-default-features (cli)
            flags: --no-default-features -p host-identity-cli
          - name: container only
            flags: --no-default-features --features container -p host-identity
          - name: all cloud features
            flags: --no-default-features --features aws,gcp,azure,digitalocean,hetzner,oci,k8s -p host-identity
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build ${{ matrix.flags }} --locked

  manpage:
    name: man pages up to date
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Regenerate man pages
        run: cargo xtask
      - name: Verify no drift
        run: |
          if ! git diff --exit-code -- man/; then
            echo "::error::Committed man pages are out of sync. Run 'cargo xtask' and commit the result."
            exit 1
          fi

  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check advisories bans licenses sources

  # Single required status check for branch protection — depends on
  # every non-release job. Passing this one check guarantees the full
  # matrix passed.
  ci:
    name: ci
    if: always()
    needs:
      - fmt
      - clippy
      - docs
      - test
      - msrv
      - feature-matrix
      - manpage
      - deny
    runs-on: ubuntu-latest
    steps:
      - name: Fail if any dependency failed or was cancelled
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
        run: exit 1

# Release-time SBOM generation, binary builds, packaging, signing, and
# publishing live in .github/workflows/release.yml (triggered on v* tags).
