name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

# Default to read-only; jobs that need more escalate explicitly.
permissions:
  contents: read

# Cancel in-progress runs for the same ref (e.g. PR pushes) but not on
# main or tag builds — those should always complete.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' && !startsWith(github.ref, 'refs/tags/') }}

# All `uses:` below are pinned to commit SHAs to eliminate supply-chain
# risk from action-release spoofing. Bump via Dependabot (see
# .github/dependabot.yml), which rewrites the SHA + version comment.
env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  CARGO_NET_RETRY: 10
  RUSTUP_MAX_RETRIES: 10
  RUSTFLAGS: "-D warnings"
  RUSTDOCFLAGS: "-D warnings"

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable tip
        with:
          toolchain: stable
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable tip
        with:
          toolchain: stable
          components: clippy
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - run: cargo clippy --all-targets --all-features --workspace -- -D warnings

  docs:
    name: rustdoc
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable tip
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - run: cargo doc --no-deps --all-features --workspace

  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable tip
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - run: cargo test --all-features --workspace --locked

  msrv:
    name: msrv (1.85)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # 1.85
        with:
          toolchain: "1.85"
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      # Build only — MSRV is a compile-time promise; dev-deps may
      # require a newer toolchain.
      - run: cargo build --all-features --workspace --locked

  feature-matrix:
    name: features (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: no-default-features (lib)
            flags: --no-default-features -p host-identity
          - name: no-default-features (cli)
            flags: --no-default-features -p host-identity-cli
          - name: container only
            flags: --no-default-features --features container -p host-identity
          - name: all cloud features
            flags: --no-default-features --features aws,gcp,azure,digitalocean,hetzner,oci,openstack,k8s -p host-identity
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable tip
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - run: cargo build ${{ matrix.flags }} --locked

  manpage:
    name: man pages up to date
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable tip
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Regenerate man pages
        run: cargo xtask
      - name: Verify no drift
        run: |
          if ! git diff --exit-code -- man/; then
            echo "::error::Committed man pages are out of sync. Run 'cargo xtask' and commit the result."
            exit 1
          fi

  shellspec:
    name: shellspec (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    env:
      SHELLSPEC_VERSION: "0.28.1"
      # sha256 of
      # https://github.com/shellspec/shellspec/archive/refs/tags/0.28.1.tar.gz
      SHELLSPEC_SHA256: "400d835466429a5fe6c77a62775a9173729d61dd43e05dfa893e8cf6cb511783"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable tip
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Install jq (ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get update -qq && sudo apt-get install -y -qq jq
      - name: Install shellspec (tarball + sha256)
        shell: bash
        run: |
          set -euo pipefail
          # Install under $RUNNER_TEMP so the extracted tree never
          # appears inside the workspace checkout (Cargo would ignore it
          # but it would still pollute `git status` for any later step).
          cd "$RUNNER_TEMP"
          url="https://github.com/shellspec/shellspec/archive/refs/tags/${SHELLSPEC_VERSION}.tar.gz"
          curl -fsSL -o shellspec.tar.gz "$url"
          case "$RUNNER_OS" in
            Linux)  echo "${SHELLSPEC_SHA256}  shellspec.tar.gz" | sha256sum -c - ;;
            macOS)  echo "${SHELLSPEC_SHA256}  shellspec.tar.gz" | shasum -a 256 -c - ;;
            *)      echo "unsupported runner OS: $RUNNER_OS" >&2; exit 1 ;;
          esac
          tar -xzf shellspec.tar.gz
          echo "$RUNNER_TEMP/shellspec-${SHELLSPEC_VERSION}/bin" >> "$GITHUB_PATH"
      - name: Build CLI
        run: cargo build -p host-identity-cli --locked
      - name: Run shellspec suite
        run: cargo xtask shellspec

  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: EmbarkStudios/cargo-deny-action@91bf2b620e09e18d6eb78b92e7861937469acedb # v2.0.17
        with:
          command: check advisories bans licenses sources

  license-audit:
    name: license-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-about@0.8.4
      # Fails if any dep in the CLI's transitive closure resolves to a
      # license not in `about.toml` `accepted`. Dependabot PRs that
      # introduce an unapproved license now fail here instead of
      # silently slipping into the release.
      - name: Render third-party attribution bundle
        run: |
          cargo about generate --locked \
            --manifest-path crates/host-identity-cli/Cargo.toml \
            about.hbs > /dev/null

  # Single required status check for branch protection — depends on
  # every non-release job. Passing this one check guarantees the full
  # matrix passed.
  ci:
    name: ci
    if: always()
    needs:
      - fmt
      - clippy
      - docs
      - test
      - msrv
      - feature-matrix
      - manpage
      - shellspec
      - deny
      - license-audit
    runs-on: ubuntu-latest
    steps:
      - name: Fail if any dependency failed or was cancelled
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
        run: exit 1

# Release-time SBOM generation, binary builds, packaging, signing, and
# publishing live in .github/workflows/release.yml (triggered on v* tags).
