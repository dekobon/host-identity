version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      actions:
        patterns: ["*"]
    commit-message:
      prefix: "ci"
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: "deps"
    ignore:
      # MSRV is 1.85 — block updates that bump minimum Rust version.
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
